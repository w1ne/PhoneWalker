[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor settings
monitor_speed = 115200
monitor_port = /dev/ttyACM*

; Custom board configuration for actual hardware
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = default.csv
board_build.psram_type = none

; Disable PSRAM completely
build_flags =
    -DBOARD_HAS_PSRAM=0
    -DCONFIG_SPIRAM_SUPPORT=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1

; Force correct flash size in bootloader
board_upload.flash_size = 4MB
upload_protocol = esptool

; Libraries for PhoneWalker
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    Wire

; Upload settings
upload_speed = 921600
upload_port = /dev/ttyACM*

[env:arduino_uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200

; Alternative environment for Arduino Uno testing