[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor settings
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3

; Libraries
lib_deps =
    ; Add any additional libraries here

[env:arduino_uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200

; Alternative environment for Arduino Uno testing
; Comment out esp32dev and use this for basic testing